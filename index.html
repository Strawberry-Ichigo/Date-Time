<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Date & Time</title>

<style>
    body {
        margin: 0;
        background-color: rgb(223, 238, 212);
        color: #000;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
        height: 100vh;
        overflow: hidden;
    }

    .container {
        position: absolute;
        width: 100%;
        height: 100%;

        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;

        /* 🔥 視覺微上移（上下更平衡） */
        transform: translateY(-1vh) scale(1.12);

        transition: transform 2s linear;
        padding: 2vmin;
        box-sizing: border-box;
    }

    /* 🇹🇭 🇹🇼 國旗 */
    .flags {
        display: flex;
        justify-content: center;
        gap: 15vmin;
        width: auto;
        margin-bottom: 4vh;
    }

    .flags img {
        width: 28vmin;
        height: auto;
        border-radius: 12px;
    }

    .top {
        font-size: 6vmin;
        font-weight: bold;
        margin-bottom: 1vh;
    }

    .date {
        font-size: 4vmin;
        margin-bottom: 3vh;
    }

    .time {
        font-size: 14vmin;
        font-weight: bold;
        letter-spacing: 0.05em; /* 🔥 更高级一点 */
    }
</style>
</head>

<body>

<div class="container" id="container">

    <!-- 國旗 -->
    <div class="flags">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Flag_of_Thailand.svg">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/72/Flag_of_the_Republic_of_China.svg">
    </div>

    <div class="top" id="top"></div>
    <div class="date" id="date"></div>
    <div class="time" id="time"></div>

</div>

<script>
function updateClock() {
    const now = new Date();

    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');

    const hour = String(now.getHours()).padStart(2, '0');
    const minute = String(now.getMinutes()).padStart(2, '0');
    const second = String(now.getSeconds()).padStart(2, '0');

    const buddhistYear = year + 543;
    const rocYear = year - 1911;

    document.getElementById("top").innerText =
        `佛曆 ${buddhistYear} 年 ｜ 民國 ${rocYear} 年`;

    document.getElementById("date").innerText =
        `${day}/${month}/${year}`;

    document.getElementById("time").innerText =
        `${hour}:${minute}:${second}`;
}

// 🔥 防燒屏（保留上移效果）
function moveSlightly() {
    const maxOffset = 10;

    const x = Math.random() * maxOffset - maxOffset / 2;
    const y = Math.random() * maxOffset - maxOffset / 2;

    document.getElementById("container").style.transform =
        `translate(${x}px, calc(${y}px - 3vh))`;
}

setInterval(updateClock, 1000);
setInterval(moveSlightly, 30000);

updateClock();
moveSlightly();
</script>

</body>
</html>
